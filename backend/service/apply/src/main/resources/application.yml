server:
  port: 8009

spring:
  application:
    name: apply-service
  datasource:
    url: jdbc:postgresql://localhost:5432/apply
    username: root
    password: qwer1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: apply-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# JWT 설정
jwt:
  secret: corebridge-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 1800000    # 30분 (ms)
  refresh-token-expiration: 604800000 # 7일 (ms)

# 감사 로그 설정
audit:
  enabled: true
  service-name: apply
  service-url: http://localhost:8012
# 알림 서비스 설정 (HTTP fallback)
notification:
  service:
    url: http://localhost:8010

# Outbox Pattern 설정
outbox:
  enabled: true

# AI 서비스 설정
ai:
  service:
    url: http://localhost:9001
