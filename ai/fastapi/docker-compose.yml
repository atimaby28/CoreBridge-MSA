version: '3.8'
services:
  redis:
    image: redis/redis-stack-server
    container_name: corebridge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  fastapi:
    build: .
    container_name: corebridge-ai
    ports:
      - "9001:9001"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - REDIS_HOST=redis
      - GEN_MODEL=llama3
    depends_on:
      - redis

  n8n:
    image: n8nio/n8n
    container_name: corebridge-n8n
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  redis_data:
  n8n_data: