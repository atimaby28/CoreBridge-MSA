apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: corebridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    spec:
      containers:
      - name: n8n
        image: n8nio/n8n:latest
        ports:
        - containerPort: 5678
        env:
        - name: WEBHOOK_URL
          value: "http://n8n.corebridge.svc.cluster.local:5678/"
        - name: GENERIC_TIMEZONE
          value: "Asia/Seoul"
        resources:
          requests: { memory: "512Mi", cpu: "250m" }
          limits: { memory: "1Gi", cpu: "500m" }
---
apiVersion: v1
kind: Service  # ClusterIP (내부용)
metadata:
  name: n8n
spec:
  ports:
  - port: 5678
---
apiVersion: v1
kind: Service  # LoadBalancer (외부 접근용)
metadata:
  name: n8n-external
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5678