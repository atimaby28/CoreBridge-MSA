apiVersion: apps/v1
kind: Deployment
metadata:
  name: corebridge-gateway
  namespace: corebridge
  labels:
    app: corebridge-gateway
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: corebridge-gateway
  template:
    metadata:
      labels:
        app: corebridge-gateway
    spec:
      containers:
        - name: gateway
          image: atimaby12/corebridge-gateway:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: corebridge-gateway
  namespace: corebridge
spec:
  type: NodePort
  selector:
    app: corebridge-gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30081
