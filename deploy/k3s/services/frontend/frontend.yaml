apiVersion: apps/v1
kind: Deployment
metadata:
  name: corebridge-frontend
  namespace: corebridge
  labels:
    app: corebridge-frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: corebridge-frontend
  template:
    metadata:
      labels:
        app: corebridge-frontend
    spec:
      containers:
        - name: frontend
          image: atimaby12/corebridge-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: corebridge-frontend
  namespace: corebridge
spec:
  type: NodePort
  selector:
    app: corebridge-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
