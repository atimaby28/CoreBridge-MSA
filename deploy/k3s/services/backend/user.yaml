apiVersion: apps/v1
kind: Deployment
metadata:
  name: corebridge-user
  namespace: corebridge
  labels:
    app: corebridge-user
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: corebridge-user
  template:
    metadata:
      labels:
        app: corebridge-user
    spec:
      containers:
        - name: user
          image: atimaby12/corebridge-user:latest
          ports:
            - containerPort: 8001
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: corebridge-user
  namespace: corebridge
spec:
  type: ClusterIP
  selector:
    app: corebridge-user
  ports:
    - port: 8001
      targetPort: 8001
